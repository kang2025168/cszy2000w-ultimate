services:
  mysql:
    image: mysql:8.0
    container_name: cszy_mysql
    restart: unless-stopped
    environment:
      TZ: America/Los_Angeles
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASS}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpass}
    ports:
      - "3307:3306"
    volumes:
      - ./data/mysql:/var/lib/mysql
      - ./mysql-init:/docker-entrypoint-initdb.d
    command:
      - --default-authentication-plugin=mysql_native_password
      - --default-time-zone=America/Los_Angeles
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-p${MYSQL_ROOT_PASSWORD:-rootpass}"]
      interval: 5s
      timeout: 3s
      retries: 30

  tradebot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cszy_tradebot
    working_dir: /app
    env_file:
      - .env
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      TZ: America/Los_Angeles

      # ✅ 关键：运行环境统一（兼容你代码里 TRADE_ENV/ALPACA_MODE 两套）
      # 只用 ALPACA_MODE 控制（paper/live）
      TRADE_ENV: ${ALPACA_MODE}

      # ✅ 同时注入 PAPER/LIVE 两套账号（由主程序按 TRADE_ENV 选择注入到 APCA_API_*）
      PAPER_APCA_API_KEY_ID: ${PAPER_APCA_API_KEY_ID}
      PAPER_APCA_API_SECRET_KEY: ${PAPER_APCA_API_SECRET_KEY}
      PAPER_ALPACA_BASE_URL: ${PAPER_ALPACA_BASE_URL}

      LIVE_APCA_API_KEY_ID: ${LIVE_APCA_API_KEY_ID}
      LIVE_APCA_API_SECRET_KEY: ${LIVE_APCA_API_SECRET_KEY}
      LIVE_ALPACA_BASE_URL: ${LIVE_ALPACA_BASE_URL}

      # ✅ 注意：这里不要再写死 APCA_API_KEY_ID / ALPACA_KEY 等通用变量
      # 否则会把你永远锁死在 paper key（你现在遇到的就是这个问题）

    volumes:
      - ./app:/app/app
      - ./data:/app/data
      - ./logs:/app/logs
      - ./scripts:/app/scripts
    depends_on:
      mysql:
        condition: service_healthy
    command: ["bash", "-lc", "./scripts/run.sh strategy_a"]
    restart: unless-stopped

# ─────────────────────────────────────────────────────────────
# 把下面这段加到你现有的 docker-compose.yml 的 services: 下面
# ─────────────────────────────────────────────────────────────

  monitor:
    build:
      # 把 monitor_api/ 文件夹放到项目根目录改名为 monitor/
      context: ./monitor
      dockerfile: Dockerfile
    container_name: cszy_monitor
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      TZ: America/Los_Angeles
      TRADE_ENV: ${ALPACA_MODE}

      # Alpaca keys（monitor 只读账户，用 paper/live 对应的 key）
      # 改成 ${LIVE_APCA_API_KEY_ID} 看 live 账户

      APCA_API_KEY_ID: AKEEAJC3G6P5RTQTZ7L2CATYTY
      APCA_API_SECRET_KEY: 77ywJFbyhXGyQE85Z9by3ivfbgury5p1Kee4HoqjX5Nm

      ALPACA_DATA_BASE_URL: https://data.alpaca.markets
      B_DATA_FEED: iex
      MONITOR_PORT: 5050
      API_CACHE_TTL: 10         # Alpaca 账户缓存秒数

    ports:
      - "5050:5050"             # 浏览器访问 http://localhost:5050
    depends_on:
      mysql:
        condition: service_healthy
