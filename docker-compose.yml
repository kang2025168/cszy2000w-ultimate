      SELL_BOT_FORCE_PHASE: ${SELL_BOT_FORCE_PHASE:-}
      SPLIT_BOT_LOG_EACH_SYMBOL: ${SPLIT_BOT_LOG_EACH_SYMBOL:-1}
      PAPER_APCA_API_KEY_ID: ${PAPER_APCA_API_KEY_ID}
      PAPER_APCA_API_SECRET_KEY: ${PAPER_APCA_API_SECRET_KEY}
      PAPER_ALPACA_BASE_URL: ${PAPER_ALPACA_BASE_URL}
      LIVE_APCA_API_KEY_ID: ${LIVE_APCA_API_KEY_ID}
      LIVE_APCA_API_SECRET_KEY: ${LIVE_APCA_API_SECRET_KEY}
      LIVE_ALPACA_BASE_URL: ${LIVE_ALPACA_BASE_URL}
    volumes:
      - ./app:/app/app
      - ./data:/app/data
      - ./logs:/app/logs
      - ./scripts:/app/scripts
    depends_on:
      mysql:
        condition: service_healthy
    command: ["bash", "-lc", "./scripts/run.sh b_sell_bot"]
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
